<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Flappy Face</title>  <style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
} 
  
body{  
    background:skyblue;  
    font-family:Arial,sans-serif;  
    overflow:hidden;  
}  
  
  
#startScreen{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    overflow:hidden;

    background:
    radial-gradient(circle at top,
        #0f172a,
        #020617,
        #000);

    animation:bgPulse 6s ease-in-out infinite;
}

@keyframes bgPulse{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.2); }
}

/* floating particles */
#startScreen::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle, rgba(0,255,255,0.08) 2px, transparent 3px);
    background-size:60px 60px;

    animation:moveParticles 12s linear infinite;
    opacity:0.6;
}

@keyframes moveParticles{
    0%{ transform:translateY(0); }
    100%{ transform:translateY(-200px); }
}
    
.startCard{
    position:relative;
    z-index:2;

    width:92%;
    max-width:420px;

    padding:35px;
    text-align:center;

    border-radius:35px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.2);

    backdrop-filter:blur(25px);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 0 25px rgba(0,255,255,0.08);

    transform:perspective(900px) rotateX(6deg);

    transition:0.4s;
}

.startCard:hover{
    transform:perspective(900px) rotateX(0deg) scale(1.03);
}

.profilePhoto{
    width:220px;
    height:220px;

    object-fit:contain;

    border-radius:50%;

    border:4px solid cyan;

    box-shadow:
        0 0 25px cyan,
        0 0 60px #2563eb;
}

.gameTitle{
    color:white;

    font-size:48px;
    font-weight:900;

    margin-top:25px;

    text-shadow:
        0 0 15px cyan,
        0 0 35px #2563eb;
}

.subtitle{
    color:#cbd5e1;

    font-size:20px;

    margin-top:10px;
    margin-bottom:35px;

    letter-spacing:3px;
}

.startBtn{
    width:340px;

    padding:18px;

    border:none;
    border-radius:60px;

    font-size:22px;
    font-weight:bold;

    color:white;

    background:linear-gradient(
        90deg,
        #06b6d4,
        #2563eb,
        #7c3aed
    );

    box-shadow:
        0 0 25px cyan,
        0 0 60px #2563eb;

    position:relative;
    overflow:hidden;

    transition:0.3s;
}

.startBtn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
    );

    transition:0.6s;
}

.startBtn:hover::before{
    left:100%;
}

.startBtn:hover{
    transform:scale(1.08);
}

.premiumBadge{
    margin-top:25px;

    color:gold;

    font-size:22px;
    font-weight:bold;

    letter-spacing:4px;

    text-shadow:
        0 0 10px gold,
        0 0 25px gold;
}

.profilePhoto{
    width:140px;
    height:140px;
    border-radius:0;
    object-fit:contain;
}

.gameTitle{
    color:white;
    font-size:34px;
    margin-top:15px;
}

.subtitle{
    color:#cbd5e1;
    margin:10px 0 20px;
}


.startBtn{
    width:100%;

    padding:15px;

    border:none;
    border-radius:50px;

    color:white;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;

    background:linear-gradient(
        90deg,
        #06b6d4,
        #2563eb
    );

    box-shadow:
    0 0 20px rgba(37,99,235,.5);
}



.startBtn:hover{
    transform:scale(1.06);
}


.startBtn:hover{
    transform:scale(1.05);
}

.premiumBadge{
    margin-top:15px;

    color:gold;

    font-weight:bold;

    letter-spacing:2px;

    text-shadow:0 0 10px gold;
}
    
#gameOverScreen{
    position:fixed;
    inset:0;

    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    radial-gradient(circle at top,
    #1a0000,
    #090909,
    #000000);

    z-index:99999;
}

/* Animated background glow */
#gameOverScreen::before{
    z-index:0;
}

#gameOverScreen > *{
    position:relative;
    z-index:2;
}

@keyframes particlesMove{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}

/* GAME OVER TEXT */
#gameOverScreen h1{
    font-size: clamp(40px, 10vw, 70px);
    font-weight: 900;
    letter-spacing: 4px;
    white-space: nowrap;
    text-align: center;

    color:white;

    white-space: nowrap;

    text-shadow:
        0 0 10px #fff,
        0 0 25px #ff2d2d,
        0 0 60px #ff0000,
        0 0 120px #ff0000;

    animation:gameOverPulse 1.5s infinite alternate;
}

/* SCORE */
#finalScore{
    margin-top:15px;

    padding:15px 35px;

    border-radius:25px;

    background:
    rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    color:#00e5ff;

    font-size:34px;
    font-weight:bold;

    box-shadow:
    0 0 25px cyan;

    text-shadow:
    0 0 20px cyan;
}

/* IMAGE */

/* RESTART BUTTON */
#gameOverScreen button{
    margin-top:25px;
    padding:15px 40px;

    font-size:20px;
    font-weight:bold;

    border:none;
    border-radius:50px;

    color:white;

    background:linear-gradient(90deg,#ff0000,#ff6600);

    box-shadow:0 0 30px red;

    cursor:pointer;

    transition:0.3s;
}

#gameOverScreen button:hover{
    transform:scale(1.1);
    box-shadow:0 0 60px orange;
}

/* RANK BADGE */
#rankBadge{
    margin-top:15px;
    padding:8px 20px;

    border-radius:20px;

    font-weight:bold;
    letter-spacing:2px;

    background:gold;
    color:black;

    box-shadow:0 0 20px gold;
}
  
button{  
    padding:12px 25px;  
    font-size:20px;  
    margin-top:15px;  
    cursor:pointer;  
}  
  
canvas{  
    display:none;  
    width:100vw;  
    height:100vh;  
    background:linear-gradient(#87CEEB,#E0F6FF);  
}
  
.faceBtn{
    width:70px;
    height:70px;

    border:none;
    border-radius:50%;

    color:white;
    font-size:28px;
    font-weight:bold;

    cursor:pointer;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #2563eb
    );

    box-shadow:
        0 0 15px rgba(0,255,255,0.6),
        0 0 35px rgba(37,99,235,0.5);

    transition:0.25s ease;
    position:relative;
    overflow:hidden;
}

/* Glow sweep effect */
.faceBtn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(0,255,255,0.4),
        transparent
    );
    transition:0.5s;
}

.faceBtn:hover::before{
    left:100%;
}

.faceBtn:hover{
    transform:scale(1.12) rotate(8deg);
    box-shadow:
        0 0 25px cyan,
        0 0 60px #2563eb;
}

.faceBtn:active{
    transform:scale(0.95);
}
    
#pauseBtn{
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    z-index:10000;

    border:none;
    background:transparent; /* background काढला */

    width:auto;
    height:auto;

    border-radius:0; /* circle काढला */

    font-size:55px; /* emoji मोठा */

    box-shadow:none; /* glow काढला */
    cursor:pointer;
}
    
#pauseOverlay{
    display:none;

    position:fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:320px;
    padding:35px;

    text-align:center;

    color:white;

    background:rgba(10,15,30,.9);

    backdrop-filter:blur(20px);

    border:2px solid rgba(255,255,255,.2);

    border-radius:25px;

    box-shadow:
        0 0 25px cyan,
        0 0 60px #2563eb;

    z-index:99999;

    animation:popup .3s ease;
    
}

@keyframes popup{
    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(.8);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}
    
#countdown{
    display:none;

    position:fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:120px;
    font-weight:bold;

    color:white;

    text-shadow:
        0 0 20px cyan,
        0 0 50px #2563eb;

    z-index:100000;
}
    
#endPhoto{
    width:240px;
    height:240px;

    object-fit:contain;
    background:transparent;

    border-radius:50%;

    box-shadow:
        0 0 30px #ff0000,
        0 0 60px #ff3333,
        0 0 120px #ff0000;

    background:#111;

    animation:endPhotoPulse 1.8s infinite alternate;
}

@keyframes endPhotoPulse{
    from{
        transform:scale(1);
        box-shadow:
            0 0 30px #ff0000,
            0 0 60px #ff3333,
            0 0 120px #ff0000;
    }

    to{
        transform:scale(1.08);
        box-shadow:
            0 0 50px #ff0000,
            0 0 100px #ff4444,
            0 0 180px #ff0000;
    }
}
    
.gameMsg{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;

    color:#ffcc00;

    text-shadow:
        0 0 10px black,
        0 0 20px red;

    animation:pulseText 1.5s infinite;
}

@keyframes btnGlow{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:300% 50%;
    }
}

    .ultraMsg{
    margin-top:20px;

    padding:15px 35px;

    border-radius:50px;

    font-size:24px;
    font-weight:900;

    color:white;

    background:
    linear-gradient(
    90deg,
    #ff0000,
    #ff6600,
    #ff0000);

    background-size:300%;

    box-shadow:
    0 0 30px red,
    0 0 70px orange;

    animation:
    btnGlow 3s linear infinite,
    pulseText 1.2s infinite;
}

/* moving glow */
@keyframes glowMove{
    0%{
        background-position:0%;
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        background-position:100%;
        transform:scale(1);
    }
}

/* shake effect */
@keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-2px); }
    50%{ transform:translateX(2px); }
    75%{ transform:translateX(-1px); }
}
    </style>  
</head>  
<body> 
    
<div id="startScreen">
    <div class="startCard">

        <div style="
display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin-bottom:15px;
">

    <button class="faceBtn" onclick="prevFace()">◀</button>

    <img id="selectedFace"
         class="profilePhoto"
         src="face1.png">

    <button class="faceBtn" onclick="nextFace()">▶</button>

</div>

        <h1 class="gameTitle">SANCHIT GAME</h1>

        <p class="subtitle">
            ULTRA PREMIUM EDITION
        </p>

        <button class="startBtn" onclick="startGame()">
            🚀 START GAME
        </button>

    </div>
</div>
    
 <div id="gameOverScreen">  
    <h1>GAME OVER</h1> 
    <img id="endPhoto" src="gameover.png">

<div id="rankBadge" class="ultraMsg"></div>     
    <h2 id="finalScore">Score: 0</h2>
     
    <button onclick="restartGame()">RESTART</button>  
</div>  
    <div id="countdown">3</div>
    <div id="pauseOverlay">

    <h2 style="
        margin-bottom:20px;
        font-size:32px;
        text-shadow:0 0 15px cyan;
    ">
        ⏸ GAME PAUSED
    </h2>

    <button onclick="togglePause()"
    style="
        padding:15px 40px;
        border:none;
        border-radius:50px;
        font-size:22px;
        font-weight:bold;
        color:white;

        background:linear-gradient(
            90deg,
            #06b6d4,
            #2563eb,
            #7c3aed
        );

        box-shadow:0 0 20px cyan;
        cursor:pointer;
    ">
        ▶ RESUME
    </button>

</div>
    <canvas id="gameCanvas"></canvas>
    <button id="pauseBtn" onclick="togglePause()">⏸</button>

<script> 
const clickSound = new Audio("click.mp3");
clickSound.preload = "auto";

const gameOverSound = new Audio("gameover.mp3");
gameOverSound.preload = "auto";
    
const canvas = document.getElementById("gameCanvas");  
const ctx = canvas.getContext("2d");  
  
function resizeCanvas(){  
    canvas.width = window.innerWidth;  
    canvas.height = window.innerHeight;  
}  
resizeCanvas();  
window.addEventListener("resize", resizeCanvas);  
  
const startScreen = document.getElementById("startScreen");  
const gameOverScreen = document.getElementById("gameOverScreen");  
const finalScore = document.getElementById("finalScore");  
  
let gameStarted = false;  
let gameOver = false;  
let score = 0; 
let isPaused = false;
let pipeTimer;
let gameOverPlayed = false;
let wingKick = 0;    
  
const faces = [
    "face1.png",
    "face2.png",
    "face3.png"
];
    
let currentFace = 0;

const birdImg = new Image();
birdImg.src = faces[currentFace];  
  
let bird = {  
    x:80,  
    y:window.innerHeight/2,  
    width:45,  
    height:45,  
    velocity:0  
};  
  
const gravity = 0.20;  
const jumpPower = -4.5;  
  
let pipes = [];
let clouds = [];

for(let i = 0; i < 6; i++){
    clouds.push({
        x: Math.random() * canvas.width,
        y: Math.random() * (canvas.height / 2),
        size: 40 + Math.random() * 40,
        speed: 0.5 + Math.random()
    });
}
    
function updateFace(){  
    document.getElementById("selectedFace").src = faces[currentFace];  
    birdImg.src = faces[currentFace]; // ⭐ ADD THIS
}

function prevFace(){
    currentFace = (currentFace - 1 + faces.length) % faces.length;
    updateFace();
}

function nextFace(){
    currentFace = (currentFace + 1) % faces.length;
    updateFace();
}
  
function startGame(){
    birdImg.src = faces[currentFace];
    startScreen.style.display = "none";
    canvas.style.display = "block";

    gameStarted = true;

    document.getElementById("pauseBtn").style.display = "block";

    clickSound.play().then(()=>clickSound.pause());

    pipeTimer = setInterval(createPipe,1200);
    bird.velocity = jumpPower;
}
    
function playClickSound(){
    const s = clickSound.cloneNode();
    s.volume = 0.5;
    s.play();
}
  
function restartGame(){  
    clearInterval(pipeTimer);  
    location.reload();  
}
  
function flap(){  
    if(!gameStarted || gameOver || isPaused) return;  

    bird.velocity = jumpPower;  
    playClickSound();  

    // wing boost trigger
    wingKick = 12;
}
  
document.addEventListener("keydown",e=>{  
    if(e.code==="Space"){  
        flap();  
    }  
});  
  
canvas.addEventListener("click",flap);  
  
function createPipe(){

    if(isPaused || !gameStarted || gameOver) return;

    let gap = 230;
    let topHeight = Math.floor(Math.random()*250)+50;

    pipes.push({
        x: canvas.width,
        width: 50,
        top: topHeight,
        bottom: topHeight + gap,
        scored: false
    });
}
  
  
function endGame(){  

    if(gameOverPlayed) return;
    gameOverPlayed = true;

    gameOver = true;  

    finalScore.innerText = "Score: " + score;

    // 👇 FIXED IMAGE (PRO FEATURE)
    document.getElementById("endPhoto").src = "gameover.png";

    document.getElementById("rankBadge").innerText =
"इसका कारण ये है 👆";

    gameOverScreen.style.display = "flex";

    clearInterval(pipeTimer);

    document.getElementById("pauseBtn").style.display = "none";

    playGameOverSound();
}
    
function playGameOverSound(){
    const s = gameOverSound.cloneNode();
    s.volume = 0.7;
    s.play();
}

function togglePause(){

    if(!gameStarted || gameOver) return;

    const btn = document.getElementById("pauseBtn");
    const overlay = document.getElementById("pauseOverlay");

    if(!isPaused){

        isPaused = true;

        btn.style.display = "none";
        overlay.style.display = "block";

    }else{

        overlay.style.display = "none";

        btn.style.display = "block";
        btn.innerHTML = "⏸";

        startCountdown();
    }
}
    
function startCountdown(){

    const cd = document.getElementById("countdown");

    let count = 3;

    cd.innerText = count;
    cd.style.display = "block";

    const timer = setInterval(()=>{

        count--;

        if(count > 0){
            cd.innerText = count;
        }
        else{

            cd.innerText = "GO!";

            setTimeout(()=>{
                cd.style.display = "none";
                isPaused = false;
                
                bird.velocity = jumpPower;
            },500);

            clearInterval(timer);
        }

    },1000);
}
  
function update(){
    if(isPaused)return;
    
    if(!gameStarted || gameOver) return;  
  
    bird.velocity += gravity;  
    bird.y += bird.velocity;
    
    for(let cloud of clouds){
    cloud.x -= cloud.speed;

    if(cloud.x + cloud.size < 0){
        cloud.x = canvas.width + 50;
        cloud.y = Math.random() * (canvas.height / 2);
    }
}    
  
    if(  
        bird.y < 0 ||  
        bird.y + bird.height > canvas.height  
    ){  
        endGame();  
    }  
  
    for(let i=0;i<pipes.length;i++){  
  
        let pipe = pipes[i];  
  
        pipe.x -= 2;  
  
        if(  
            bird.x < pipe.x + pipe.width &&  
            bird.x + bird.width > pipe.x &&  
            (  
                bird.y < pipe.top ||  
                bird.y + bird.height > pipe.bottom  
            )  
        ){  
            endGame();  
        }  
  
        if(  
            !pipe.scored &&  
            pipe.x + pipe.width < bird.x  
        ){  
            score++;  
            pipe.scored=true;  
        }  
    }  
  
    pipes = pipes.filter(pipe=>pipe.x>-100);  
}  
  
function draw(){  
  
    ctx.clearRect(0,0,canvas.width,canvas.height);
for(let cloud of clouds){
    ctx.fillStyle = "rgba(255,255,255,0.9)";

    ctx.beginPath();
    ctx.arc(cloud.x, cloud.y, cloud.size * 0.3, 0, Math.PI * 2);
    ctx.arc(cloud.x + 15, cloud.y + 5, cloud.size * 0.35, 0, Math.PI * 2);
    ctx.arc(cloud.x - 15, cloud.y + 5, cloud.size * 0.35, 0, Math.PI * 2);
    ctx.fill();
}    
    
  
    // Score  
    ctx.fillStyle = "white";
ctx.font = "30px Arial";
ctx.textAlign = "left";


ctx.shadowBlur = 0;
  
    // Pipes  
    for(let pipe of pipes){  
  
        ctx.fillStyle = "#2ecc40";  
        // 3D Top Pipe  
let gradTop = ctx.createLinearGradient(  
    pipe.x, 0,  
    pipe.x + pipe.width, 0  
);  
  
gradTop.addColorStop(0,"#0a5f0a");  
gradTop.addColorStop(0.5,"#4cff4c");  
gradTop.addColorStop(1,"#0a5f0a");  
  
ctx.fillStyle = gradTop;  
  
ctx.fillRect(  
    pipe.x,  
    0,  
    pipe.width,  
    pipe.top  
);  
  
// 3D Bottom Pipe  
ctx.fillRect(  
    pipe.x,  
    pipe.bottom,  
    pipe.width,  
    canvas.height - pipe.bottom  
);  
  
// Pipe Caps  
ctx.fillRect(  
    pipe.x - 8,  
    pipe.top - 20,  
    pipe.width + 16,  
    20  
);  
  
ctx.fillRect(  
    pipe.x - 8,  
    pipe.bottom,  
    pipe.width + 16,  
    20  
);  
  
// Shine Effect  
ctx.fillStyle = "rgba(255,255,255,0.35)";  
  
ctx.fillRect(  
    pipe.x + 5,  
    0,  
    5, 
    pipe.top  
);  
  
ctx.fillRect(  
    pipe.x + 5,  
    pipe.bottom,  
    5,  
    canvas.height - pipe.bottom  
);  
    
    }  
  
   // FACE BIRD + WINGS TOGETHER
if(birdImg.complete){
    ctx.save();

    let angle = bird.velocity * 0.05;
    angle = Math.max(-0.5, Math.min(0.5, angle));

    ctx.translate(
        bird.x + bird.width/2,
        bird.y + bird.height/2
    );

    ctx.rotate(angle);

    // 🪽 WINGS FIRST (behind face)
    wingKick *= 0.10; // slow decay

let flapBase = Math.sin(Date.now() * 0.08) * 6;
let flapForce = wingKick;
let flap = flapBase + flapForce;

    ctx.fillStyle = "rgba(200,220,255,0.9)";
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;

    // LEFT WING
    ctx.beginPath();
    ctx.moveTo(-10, 5);
    ctx.quadraticCurveTo(-45, -10 - flap, -70, 10);
    ctx.quadraticCurveTo(-45, 25 + flap, -10, 5);
    ctx.fill();
    ctx.stroke();

    // RIGHT WING
    ctx.beginPath();
    ctx.moveTo(10, 5);
    ctx.quadraticCurveTo(45, -10 - flap, 70, 10);
    ctx.quadraticCurveTo(45, 25 + flap, 10, 5);
    ctx.fill();
    ctx.stroke();

    // 🐦 FACE ON TOP
    ctx.drawImage(
        birdImg,
        -bird.width/2,
        -bird.height/2,
        bird.width,
        bird.height
    );

    ctx.restore();
}
    
/* ✅ SCORE UI (ALWAYS ON TOP) */
ctx.save();

ctx.shadowColor = "transparent";
ctx.shadowBlur = 0;

ctx.fillStyle = "white";
ctx.font = "bold 30px Arial";
ctx.fillText("Score: " + score, 15, 40);
